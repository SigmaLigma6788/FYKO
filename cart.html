<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FYKO Warenkorb</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">FYKO</div>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">🛒 <span id="cart-count">0</span></a>
</nav>

</header>

<section class="featured">

<h2>DEIN WARENKORB</h2>

<div id="cart-items"></div>

<h2 id="total">Gesamt: 0 CHF</h2>

<button onclick="checkout()">ZUR KASSE</button>

</section>

<footer>
<p>© 2026 FYKO • BUILT DIFFERENT.</p>
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartItems = document.getElementById("cart-items");
const total = document.getElementById("total");
const cartCount = document.getElementById("cart-count");

function renderCart(){

cartItems.innerHTML="";

let sum=0;

cartCount.innerText=cart.length;

cart.forEach((item,index)=>{

sum+=item.price;

cartItems.innerHTML+=`
<div class="card">
<h3>${item.name}</h3>
<p>${item.price} CHF</p>
<button onclick="removeItem(${index})">Entfernen</button>
</div>
`;

});

total.innerText="Gesamt: "+sum+" CHF";

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

renderCart();

}

function checkout(){

if(cart.length===0){
alert("Dein Warenkorb ist leer.");
return;
}

alert("Checkout kommt bald!");

}

renderCart();

</script>

</body>
</html>
